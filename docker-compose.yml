name: rag-system

services:
  # ------------------------------------------------------------------
  # API Gateway (Kong) - DB-less declarative mode
  # ------------------------------------------------------------------
  kong:
    image: kong:3.5
    container_name: rag-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "8000:8000"   # Proxy HTTP
      - "8443:8443"   # Proxy HTTPS
      - "8001:8001"   # Admin API
      - "8444:8444"   # Admin API HTTPS
    volumes:
      - ./kong.yml:/kong/declarative/kong.yml:ro
    networks:
      - rag-network
    depends_on:
      app-backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kong health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ------------------------------------------------------------------
  # Application backend (placeholder build, will be replaced by real FastAPI)
  # ------------------------------------------------------------------
  app-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-your-dockerhub-username/rag-backend}:${IMAGE_TAG:-latest}
    container_name: rag-app-backend
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: ${DATABASE_URL:-postgresql://rag_user:rag_password@postgres:5432/rag_kb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      MILVUS_HOST: ${MILVUS_HOST:-milvus-standalone}
      MILVUS_PORT: ${MILVUS_PORT:-19530}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-rag-documents}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      # 模型服务配置统一由 backend/.env 提供，便于前端模型配置页面持久化修改
    volumes:
      - ./backend/.env:/app/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      milvus-standalone:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ------------------------------------------------------------------
  # Workers (placeholder builds)
  # ------------------------------------------------------------------
  ingest-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: rag-ingest-worker
    environment:
      WORKER_QUEUE: ingest
      DATABASE_URL: ${DATABASE_URL:-postgresql://rag_user:rag_password@postgres:5432/rag_kb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-rag-documents}
      MILVUS_HOST: ${MILVUS_HOST:-milvus-standalone}
      MILVUS_PORT: ${MILVUS_PORT:-19530}
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      milvus-standalone:
        condition: service_healthy
    networks:
      - rag-network

  embedding-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.embedding
    container_name: rag-embedding-service
    environment:
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-768}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rag-network

  embed-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: rag-embed-worker
    environment:
      WORKER_QUEUE: embed
      DATABASE_URL: ${DATABASE_URL:-postgresql://rag_user:rag_password@postgres:5432/rag_kb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      MILVUS_HOST: ${MILVUS_HOST:-milvus-standalone}
      MILVUS_PORT: ${MILVUS_PORT:-19530}
      EMBEDDING_MODEL_URL: ${EMBEDDING_MODEL_URL:-http://embedding-service:8080}
    # TODO: 私有化 GPU 环境启用 nvidia 运行时后，可添加 deploy.resources.reservations.devices
    depends_on:
      rabbitmq:
        condition: service_healthy
      milvus-standalone:
        condition: service_healthy
      embedding-service:
        condition: service_healthy
    networks:
      - rag-network

  permission-sync-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: rag-permission-sync-worker
    environment:
      WORKER_QUEUE: permission_sync
      DATABASE_URL: ${DATABASE_URL:-postgresql://rag_user:rag_password@postgres:5432/rag_kb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rag-network

  # ------------------------------------------------------------------
  # Frontend (placeholder build)
  # ------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${FRONTEND_IMAGE:-your-dockerhub-username/rag-frontend}:${IMAGE_TAG:-latest}
    container_name: rag-frontend
    ports:
      - "3002:80"
    depends_on:
      app-backend:
        condition: service_healthy
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ------------------------------------------------------------------
  # Data stores
  # ------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: rag-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_password}
      POSTGRES_DB: ${POSTGRES_DB:-rag_kb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: rag-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rag-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ------------------------------------------------------------------
  # Vector store
  # ------------------------------------------------------------------
  milvus-standalone:
    image: milvusdb/milvus:v2.4.1
    container_name: rag-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      COMMON_ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    networks:
      - rag-network
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9091/healthz || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  etcd:
    image: gcr.io/etcd-development/etcd:v3.5.5
    container_name: rag-etcd
    command:
      - etcd
      - -advertise-client-urls=http://etcd:2379
      - -listen-client-urls=http://0.0.0.0:2379
      - -data-dir=/etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    volumes:
      - etcd_data:/etcd
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ------------------------------------------------------------------
  # Object storage
  # ------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: rag-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  minio-init:
    image: minio/mc:latest
    container_name: rag-minio-init
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-rag-documents}
    volumes:
      - ./scripts/init-minio.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    networks:
      - rag-network
    depends_on:
      minio:
        condition: service_healthy
    restart: on-failure

  # ------------------------------------------------------------------
  # Observability
  # ------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: rag-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  alertmanager:
    image: prom/alertmanager:latest
    container_name: rag-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    container_name: rag-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - rag-network
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ------------------------------------------------------------------
  # Optional exporters (start with --profile monitoring-exporters)
  # ------------------------------------------------------------------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: rag-postgres-exporter
    environment:
      DATA_SOURCE_NAME: ${DATABASE_URL:-postgresql://rag_user:rag_password@postgres:5432/rag_kb?sslmode=disable}
    networks:
      - rag-network
    profiles:
      - monitoring-exporters

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: rag-redis-exporter
    environment:
      REDIS_ADDR: ${REDIS_URL:-redis://redis:6379}
    networks:
      - rag-network
    profiles:
      - monitoring-exporters

  rabbitmq-exporter:
    image: kbudde/rabbitmq-exporter:latest
    container_name: rag-rabbitmq-exporter
    environment:
      RABBIT_URL: ${RABBITMQ_URL:-http://rabbitmq:15672}
      RABBIT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBIT_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
    networks:
      - rag-network
    profiles:
      - monitoring-exporters

  node-exporter:
    image: prom/node-exporter:latest
    container_name: rag-node-exporter
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    networks:
      - rag-network
    profiles:
      - monitoring-exporters

# ----------------------------------------------------------------------
# Volumes & Networks
# ----------------------------------------------------------------------
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  milvus_data:
  etcd_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  rag-network:
    driver: bridge
