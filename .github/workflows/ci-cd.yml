name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  REGISTRY: ${{ secrets.REGISTRY_URL || 'docker.io' }}
  BACKEND_IMAGE: ${{ secrets.BACKEND_IMAGE || 'your-dockerhub-username/rag-backend' }}
  FRONTEND_IMAGE: ${{ secrets.FRONTEND_IMAGE || 'your-dockerhub-username/rag-frontend' }}

jobs:
  # =============================================================================
  # 阶段一：代码检查与单元测试
  # =============================================================================
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rag_user
          POSTGRES_PASSWORD: rag_password
          POSTGRES_DB: rag_kb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------- 后端检查 --------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit pytest pytest-asyncio
          pip install -r requirements.txt

      - name: Lint Python with Ruff
        working-directory: backend
        run: ruff check app --output-format=github

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://rag_user:rag_password@localhost:5432/rag_kb
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key
        run: pytest -q

      # -------------------------- 前端检查 --------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend with ESLint
        working-directory: frontend
        run: npm run lint

      - name: Type-check frontend
        working-directory: frontend
        run: npm run build

  # =============================================================================
  # 阶段二：安全扫描
  # =============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Scan Python with Bandit
        working-directory: backend
        run: |
          pip install bandit
          bandit -r app -f json -o bandit-report.json || true
          bandit -r app

      - name: Detect secrets with TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --only-verified

      - name: Scan repo with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: 1

  # =============================================================================
  # 阶段三：构建并推送 Docker 镜像
  # =============================================================================
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [lint-and-test, security-scan]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
          severity: HIGH,CRITICAL
          exit-code: 0

  # =============================================================================
  # 阶段四：部署到服务器
  # =============================================================================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USERNAME }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/rag-system' }}
        run: |
          set -e
          echo "==> Deploying to $SSH_HOST:$DEPLOY_PATH"

          ssh "$SSH_USER@$SSH_HOST" "
            set -e
            DEPLOY_PATH='$DEPLOY_PATH'
            REGISTRY='${{ env.REGISTRY }}'
            REGISTRY_USERNAME='${{ secrets.REGISTRY_USERNAME }}'
            REGISTRY_PASSWORD='${{ secrets.REGISTRY_PASSWORD }}'

            # 1. Ensure Docker is available (do NOT install system-wide software)
            if ! command -v docker >/dev/null 2>&1; then
              echo 'ERROR: Docker is not installed on the server.'
              echo 'Please install Docker and Docker Compose manually, then re-run the workflow.'
              exit 1
            fi
            if ! docker compose version >/dev/null 2>&1; then
              echo 'ERROR: Docker Compose plugin is not installed on the server.'
              exit 1
            fi

            # 2. Prepare deployment directory
            if [ ! -d \"\$DEPLOY_PATH/.git\" ]; then
              echo \"Cloning repository into \$DEPLOY_PATH\"
              git clone 'https://github.com/renvvvvv/RFC-rag-for-company-.git' \"\$DEPLOY_PATH\"
            fi
            cd \"\$DEPLOY_PATH\"

            # 3. Pull latest code safely (never reset --hard to preserve local .env)
            git stash push -m 'ci-cd-auto-stash' || true
            git pull origin main
            git stash pop || true

            # 4. Protect existing .env; never overwrite it
            if [ ! -f 'backend/.env' ]; then
              echo 'backend/.env not found, creating from template.'
              cp backend/.env.example backend/.env
              echo 'WARNING: please edit backend/.env with real credentials before using the system.'
            else
              echo 'backend/.env exists, preserving it.'
            fi

            # 5. Record currently running images for rollback reference
            echo 'Currently running images:'
            docker compose ps --format 'table {{.Service}}\t{{.Image}}' || true
            docker compose images > .last-deploy-images.txt || true

            # 6. Login, pull and restart ONLY this project's services
            echo \"\$REGISTRY_PASSWORD\" | docker login \"\$REGISTRY\" -u \"\$REGISTRY_USERNAME\" --password-stdin
            docker compose pull
            docker compose up -d
            docker logout \"\$REGISTRY\" || true

            echo 'Deployment complete'
          "

      - name: Health check
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USERNAME }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/rag-system' }}
        run: |
          set -e
          sleep 15
          echo "==> Running health check"

          ssh "$SSH_USER@$SSH_HOST" "
            set -e
            DEPLOY_PATH='$DEPLOY_PATH'
            cd \"\$DEPLOY_PATH\"

            echo 'Service status:'
            docker compose ps

            echo 'Health endpoint:'
            docker compose exec -T app-backend curl -fsS http://localhost:8080/api/v1/health
            echo ''
            echo 'Health check passed'
          "

      - name: Rollback on failure
        if: failure()
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USERNAME }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/rag-system' }}
        run: |
          echo "==> Deployment or health check failed. Gathering diagnostics..."
          ssh "$SSH_USER@$SSH_HOST" "
            DEPLOY_PATH='$DEPLOY_PATH'
            cd \"\$DEPLOY_PATH\"
            echo 'Container status:'
            docker compose ps
            echo 'Backend logs (last 100 lines):'
            docker compose logs --tail=100 app-backend || true
            echo 'Previous deployment images saved in .last-deploy-images.txt:'
            cat .last-deploy-images.txt || echo 'No rollback snapshot found.'
            echo 'To rollback manually, set IMAGE_TAG to the previous tag and run: docker compose up -d'
          "
          exit 1
