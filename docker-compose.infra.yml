name: rag-infra

services:
  # ------------------------------------------------------------------
  # Data stores
  # ------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: rag-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_password}
      POSTGRES_DB: ${POSTGRES_DB:-rag_kb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag_user} -d ${POSTGRES_DB:-rag_kb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: rag-redis
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rag-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-rag_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-rag_password}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST:-/}
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ------------------------------------------------------------------
  # Vector / object storage
  # ------------------------------------------------------------------
  etcd:
    image: gcr.io/etcd-development/etcd:v3.5.5
    container_name: rag-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
    command:
      - etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    ports:
      - "2379:2379"
      - "2380:2380"
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  milvus-standalone:
    image: milvusdb/milvus:v2.4.1
    container_name: rag-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: ${ETCD_ENDPOINTS:-etcd:2379}
      MINIO_ADDRESS: ${MINIO_ADDRESS:-minio:9000}
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    networks:
      - rag-network
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: rag-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2024-06-12T14-34-03Z
    container_name: rag-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - rag-network
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      /usr/bin/mc mb myminio/${MINIO_BUCKET:-rag-documents} || true;
      exit 0;
      "

  # ------------------------------------------------------------------
  # Monitoring
  # ------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: rag-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - rag-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: rag-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - rag-network

  grafana:
    image: grafana/grafana:10.4.4
    container_name: rag-grafana
    ports:
      - "3001:3000"
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - rag-network
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}

  # Optional exporters (start with --profile monitoring-exporters)
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: rag-postgres-exporter
    environment:
      DATA_SOURCE_NAME: ${DATABASE_URL:-postgresql://rag_user:rag_password@postgres:5432/rag_kb?sslmode=disable}
    networks:
      - rag-network
    profiles:
      - monitoring-exporters

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: rag-redis-exporter
    environment:
      REDIS_ADDR: ${REDIS_URL:-redis://redis:6379}
    networks:
      - rag-network
    profiles:
      - monitoring-exporters

  rabbitmq-exporter:
    image: kbudde/rabbitmq-exporter:latest
    container_name: rag-rabbitmq-exporter
    environment:
      RABBIT_URL: ${RABBITMQ_URL:-http://rabbitmq:15672}
      RABBIT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBIT_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
    networks:
      - rag-network
    profiles:
      - monitoring-exporters

  node-exporter:
    image: prom/node-exporter:latest
    container_name: rag-node-exporter
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    networks:
      - rag-network
    profiles:
      - monitoring-exporters

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  etcd_data:
  milvus_data:
  minio_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  rag-network:
    name: rag-network
    driver: bridge
