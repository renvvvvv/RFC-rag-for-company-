name: rag-${DEPLOY_COLOR:-blue}

services:
  # ------------------------------------------------------------------
  # API Gateway (Kong) - per color instance
  # ------------------------------------------------------------------
  kong:
    image: kong:3.5
    container_name: rag-${DEPLOY_COLOR:-blue}-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "${KONG_PROXY_HTTP_PORT:-8000}:8000"
      - "${KONG_PROXY_HTTPS_PORT:-8443}:8443"
      - "${KONG_ADMIN_PORT:-8001}:8001"
      - "${KONG_ADMIN_HTTPS_PORT:-8444}:8444"
    volumes:
      - ./kong.yml:/kong/declarative/kong.yml:ro
    networks:
      - rag-network
    depends_on:
      app-backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kong health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ------------------------------------------------------------------
  # Application backend
  # ------------------------------------------------------------------
  app-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-your-dockerhub-username/rag-backend}:${IMAGE_TAG:-latest}
    container_name: rag-${DEPLOY_COLOR:-blue}-app-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: ${DATABASE_URL:-postgresql://rag_user:rag_password@postgres:5432/rag_kb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      MILVUS_HOST: ${MILVUS_HOST:-milvus-standalone}
      MILVUS_PORT: ${MILVUS_PORT:-19530}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-rag-documents}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    volumes:
      - ./backend/.env:/app/.env
    # Infrastructure services live in docker-compose.infra.yml and must be
    # started before the application layer. They are reachable via the shared
    # external network "rag-network".
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ------------------------------------------------------------------
  # Frontend
  # ------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${FRONTEND_IMAGE:-your-dockerhub-username/rag-frontend}:${IMAGE_TAG:-latest}
    container_name: rag-${DEPLOY_COLOR:-blue}-frontend
    ports:
      - "${FRONTEND_PORT:-3002}:80"
    depends_on:
      app-backend:
        condition: service_healthy
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ------------------------------------------------------------------
  # Background workers
  # ------------------------------------------------------------------
  ingest-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: rag-${DEPLOY_COLOR:-blue}-ingest-worker
    command: celery -A app.workers.celery_app worker -Q ingest -n ingest_${DEPLOY_COLOR:-blue}@%h --loglevel=info
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://rag_user:rag_password@postgres:5432/rag_kb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      MILVUS_HOST: ${MILVUS_HOST:-milvus-standalone}
      MILVUS_PORT: ${MILVUS_PORT:-19530}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-rag-documents}
    networks:
      - rag-network

  embed-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: rag-${DEPLOY_COLOR:-blue}-embed-worker
    command: celery -A app.workers.celery_app worker -Q embed -n embed_${DEPLOY_COLOR:-blue}@%h --loglevel=info
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://rag_user:rag_password@postgres:5432/rag_kb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      MILVUS_HOST: ${MILVUS_HOST:-milvus-standalone}
      MILVUS_PORT: ${MILVUS_PORT:-19530}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-rag-documents}
    networks:
      - rag-network

  permission-sync-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: rag-${DEPLOY_COLOR:-blue}-permission-sync-worker
    command: celery -A app.workers.celery_app worker -Q permission_sync -n permission_sync_${DEPLOY_COLOR:-blue}@%h --loglevel=info
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://rag_user:rag_password@postgres:5432/rag_kb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
    networks:
      - rag-network

networks:
  rag-network:
    name: rag-network
    external: true
