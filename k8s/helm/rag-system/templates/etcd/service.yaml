{{- if .Values.etcd.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rag-system.fullname" . }}-etcd
  labels:
    {{- include "rag-system.labels" . | nindent 4 }}
    {{- include "rag-system.componentLabels" (dict "component" "etcd") | nindent 4 }}
spec:
  type: {{ .Values.etcd.service.type }}
  ports:
    - port: {{ .Values.etcd.service.port }}
      targetPort: client
      protocol: TCP
      name: client
    - port: {{ .Values.etcd.service.peerPort }}
      targetPort: peer
      protocol: TCP
      name: peer
  selector:
    {{- include "rag-system.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: etcd
{{- end }}
