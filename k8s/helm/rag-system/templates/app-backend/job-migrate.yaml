{{- if and .Values.appBackend.enabled .Values.appBackend.migration.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "rag-system.fullname" . }}-migrate
  labels:
    {{- include "rag-system.labels" . | nindent 4 }}
    {{- include "rag-system.componentLabels" (dict "component" "migrate") | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    metadata:
      labels:
        {{- include "rag-system.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: "{{ .Values.appBackend.image.repository }}:{{ .Values.appBackend.image.tag }}"
          imagePullPolicy: {{ .Values.appBackend.image.pullPolicy }}
          command:
            - alembic
            - upgrade
            - head
          envFrom:
            - configMapRef:
                name: {{ include "rag-system.fullname" . }}-backend-env
            - secretRef:
                name: {{ include "rag-system.fullname" . }}-secrets
{{- end }}
