apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rag-system.fullname" . }}-kong
  labels:
    {{- include "rag-system.labels" . | nindent 4 }}
data:
  kong.yml: |
    _format_version: "3.0"
    _transform: true

    services:
      - name: app-backend
        url: http://{{ include "rag-system.fullname" . }}-app-backend:8080
        routes:
          - name: app-backend-api
            paths:
              - /api
            strip_path: false
          - name: app-backend-docs
            paths:
              - /docs
              - /openapi.json
            strip_path: false

      - name: frontend
        url: http://{{ include "rag-system.fullname" . }}-frontend:80
        routes:
          - name: frontend-root
            paths:
              - /
            strip_path: false

    consumers:
      - username: default-consumer
        keyauth_credentials:
          - key: placeholder-api-key

    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          fault_tolerant: true
          hide_client_headers: false

      - name: prometheus
