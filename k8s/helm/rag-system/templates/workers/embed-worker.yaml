{{- if and .Values.workers.enabled .Values.workers.queues.embed -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rag-system.fullname" . }}-embed-worker
  labels:
    {{- include "rag-system.labels" . | nindent 4 }}
    {{- include "rag-system.componentLabels" (dict "component" "embed-worker") | nindent 4 }}
spec:
  replicas: {{ .Values.workers.queues.embed.replicaCount }}
  selector:
    matchLabels:
      {{- include "rag-system.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: embed-worker
  template:
    metadata:
      labels:
        {{- include "rag-system.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: embed-worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.workers.image.repository }}:{{ .Values.workers.image.tag }}"
          imagePullPolicy: {{ .Values.workers.image.pullPolicy }}
          command:
            - celery
            - -A
            - app.workers.celery_app
            - worker
            - -Q
            - embed
            - -n
            - embed@%h
            - -l
            - info
          envFrom:
            - configMapRef:
                name: {{ include "rag-system.fullname" . }}-backend-env
            - secretRef:
                name: {{ include "rag-system.fullname" . }}-secrets
          resources:
            {{- toYaml .Values.workers.queues.embed.resources | nindent 12 }}
{{- end }}
