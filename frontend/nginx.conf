server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS resolver; forces nginx to re-resolve upstream names
    # when used via variables, avoiding stale IPs after container recreate.
    resolver 127.0.0.11 valid=10s;

    # Disable caching for index.html so login page always picks up the latest
    # bundle reference. Hashed assets under /assets are content-addressed and
    # can be cached normally.
    location = / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files /index.html =404;
    }
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location / {
        # Disable caching for the SPA shell so users always load the latest bundle.
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    location /api {
        set $upstream_app app-backend:8080;
        proxy_pass http://$upstream_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        # Prevent FastAPI slash-redirect from stripping the external port
        proxy_redirect ~*^http://([^/]+)(.*)$ http://$http_host$2;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
