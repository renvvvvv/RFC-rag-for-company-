server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    #7.1 把上传文件的size增加了
    # Allow large file uploads (default is 1MB, too small for PDF/XLSX docs)
    client_max_body_size 200M;

    # Docker embedded DNS resolver; forces nginx to re-resolve upstream names
    # when used via variables, avoiding stale IPs after container recreate.
    resolver 127.0.0.11 valid=10s;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        set $upstream_app app-backend:8080;
        proxy_pass http://$upstream_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        # Prevent FastAPI slash-redirect from stripping the external port
        proxy_redirect ~*^http://([^/]+)(.*)$ http://$http_host$2;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
