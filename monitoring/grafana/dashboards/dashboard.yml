apiVersion: 1

providers:
  - name: "RAG Dashboards"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      # Dashboard JSON files are mounted to the same directory as this
      # provisioning file inside the Grafana container.
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true
