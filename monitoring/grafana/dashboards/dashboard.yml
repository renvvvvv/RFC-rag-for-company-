apiVersion: 1

providers:
  - name: "RAG Dashboards"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      # Dashboard JSON files are mounted under this directory inside the
      # Grafana container so they are not mixed with the provisioning YAML.
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: true
