global:
  # No SMTP is configured by default. Configure these for email receivers.
  # smtp_smarthost: 'localhost:25'
  # smtp_from: 'alertmanager@example.com'
  # smtp_require_tls: false

# Default receiver for all alerts unless matched by a route.
receivers:
  - name: default
    # Placeholder webhook that keeps Alertmanager starting even when no real
    # notification endpoint is available. Replace with PagerDuty/Slack/email/etc.
    webhook_configs:
      - url: 'http://127.0.0.1:5001/_alertmanager/webhook'
        send_resolved: false

  - name: critical
    webhook_configs:
      - url: 'http://127.0.0.1:5001/_alertmanager/webhook'
        send_resolved: false

route:
  receiver: default
  group_by: ['alertname', 'severity', 'team']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: critical
      continue: true
    - match:
        alertname: RAGServiceDown
      receiver: critical
      group_wait: 10s

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'team']
