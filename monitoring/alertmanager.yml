global:
  smtp_smarthost: 'localhost:25'
  smtp_from: 'alertmanager@example.com'
  smtp_require_tls: false

# Default receiver for all alerts unless matched by a route.
receivers:
  - name: default
    email_configs:
      - to: 'oncall@example.com'
        send_resolved: true

  - name: critical
    pagerduty_configs: []
    slack_configs: []

  - name: null

route:
  receiver: default
  group_by: ['alertname', 'severity', 'team']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: critical
      continue: true
    - match:
        alertname: RAGServiceDown
      receiver: critical
      group_wait: 10s

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'team']
