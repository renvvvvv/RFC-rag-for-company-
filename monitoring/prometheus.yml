global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: rag-system
    monitor: prometheus

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: app-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - app-backend:8080
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: kong
    metrics_path: /metrics
    static_configs:
      - targets:
          - kong:8001
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: milvus
    metrics_path: /metrics
    static_configs:
      - targets:
          - milvus-standalone:9091

  # Optional exporters (enable only when the corresponding services are started
  # with the `monitoring-exporters` Compose profile). Uncomment the jobs below
  # after starting the exporters; otherwise Prometheus reports these targets as
  # down and the `RAGServiceDown` alert fires.

  # - job_name: postgres-exporter
  #   static_configs:
  #     - targets:
  #         - postgres-exporter:9187

  # - job_name: redis-exporter
  #   static_configs:
  #     - targets:
  #         - redis-exporter:9121

  # - job_name: rabbitmq-exporter
  #   static_configs:
  #     - targets:
  #         - rabbitmq-exporter:9419

  # - job_name: node-exporter
  #   static_configs:
  #     - targets:
  #         - node-exporter:9100
